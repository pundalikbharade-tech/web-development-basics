<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Marquee</title>
  </head>
  <body>
    <h1>Marquee Tag</h1>

    <marquee>Welcome to My Website</marquee>

    <br /><br />

    <marquee direction="right">Right Side Moving Text</marquee>

    <br /><br />

    <marquee direction="up" height="100">Moving Up Text</marquee>

    <br /><br />

    <marquee direction="down" height="100">Moving Down Text</marquee>

    <br /><br />

    <marquee scrollamount="20">Fast Speed</marquee>
    <marquee scrollamount="5">Slow Speed</marquee>

    <br /><br />

    <marquee behavior="scroll">Normal Scroll</marquee>
    <marquee behavior="slide">Slide Once</marquee>
    <marquee behavior="alternate">Bounce Effect</marquee>

    <br /><br />

    <marquee loop="3">This will run only 3 times</marquee>

    <br /><br />

    <marquee bgcolor="yellow">Colored Background</marquee>
  </body>
</html>
